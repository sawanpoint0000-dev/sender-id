<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
body{
margin:0;
padding:0;
background:#0f172a;
font-family:Arial, sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:#fff;
}

.container{
text-align:center;
}

h1{
font-size:120px;
margin:0;
color:#ff3b3b;
}

h2{
margin:10px 0;
font-size:28px;
}

p{
color:#cbd5e1;
margin-bottom:25px;
}

a{
text-decoration:none;
background:#2563eb;
padding:12px 25px;
border-radius:6px;
color:#fff;
font-weight:bold;
}

a:hover{
background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">
<h1>404</h1>
<h2>Page Not Found</h2>
<p>The page you are looking for does not exist.</p>
<a href="/">Go Home</a>
</div>

</body>
</html>
